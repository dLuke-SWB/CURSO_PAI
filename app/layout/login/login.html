<div class="login-wrapper">
    
    <div class="form-side">
        <div class="form-content">
            <div class="logo-area">
                <i class="bi bi-camera2"></i>
                <span class="typewriter">{{ logoText }}</span>
            </div>

            <h1>Bem-vindo de volta</h1>
            <p class="subtitle">Insira seus dados para acessar sua conta.</p>

            <div class="social-login">
                <button class="btn-social" (click)="signInWithGoogle()">
                    <i class="bi bi-google"></i>
                    <span>Continuar com Google</span>
                </button>
            </div>

            <div class="divider">
                <span>ou</span>
            </div>

            <form>
                <div class="input-group">
                    <label>E-mail</label>
                    <input 
                        type="email" 
                        name="email" 
                        [(ngModel)]="email" 
                        placeholder="exemplo@email.com">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    
                    <div class="password-wrapper">
                        <input 
                            [type]="showPassword ? 'text' : 'password'" 
                            name="senha" 
                            [(ngModel)]="senha" 
                            placeholder="••••••••">
                        
                        <button type="button" class="btn-eye" (click)="togglePassword()">
                            <i class="bi" 
                               [class.bi-eye-fill]="showPassword" 
                               [class.bi-eye-slash-fill]="!showPassword">
                            </i>
                        </button>
                    </div>
                </div>

                <div *ngIf="errorMessage" style="color: #f79055; margin-bottom: 15px; font-size: 14px;">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    {{ errorMessage }}
                </div>

                <div class="actions">
                    <div class="check">
                        <input type="checkbox" id="remember">
                        <label for="remember">Lembrar de mim</label>
                    </div>
                    <a href="#" class="forgot">Esqueceu a senha?</a>
                </div>

                <button class="btn-login" (click)="doLogin()">Entrar</button>
            </form>

            <p class="footer-text">
                Não tem uma conta? <a href="/cadastrar">Cadastre-se</a>
            </p>
        </div>
    </div>

    <div class="visual-side">
        <div class="grid-container">
            <div class="grid-item" *ngFor="let cell of gridCells">
                <div class="image-wrapper" [class.visible]="cell.active">
                    <img [src]="cell.image" alt="poster">
                </div>
            </div>
        </div>
        
        <div class="overlay-gradient"></div>
    </div>

</div>
