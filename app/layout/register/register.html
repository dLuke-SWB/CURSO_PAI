<div class="login-wrapper">
    
    <div class="form-side">
        <div class="form-content">
            <div class="logo-area">
                <i class="bi bi-camera2"></i>
                <span class="typewriter">{{ logoText }}</span>
            </div>

            <h1>Crie sua conta</h1>
            <p class="subtitle">Comece sua jornada cinematográfica hoje.</p>

            <div class="social-login">
                <button class="btn-social">
                    <i class="bi bi-google"></i>
                    <span>Cadastrar com Google</span>
                </button>
            </div>

            <div class="divider">
                <span>ou</span>
            </div>

            <form>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input 
                        type="text" 
                        name="nome" 
                        [(ngModel)]="nome" 
                        placeholder="Seu nome">
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input 
                        type="email" 
                        name="email" 
                        [(ngModel)]="email" 
                        placeholder="exemplo@email.com">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <div class="password-wrapper">
                        <input 
                            [type]="showPassword ? 'text' : 'password'" 
                            name="senha" 
                            [(ngModel)]="senha" 
                            placeholder="••••••••">
                        
                        <button type="button" class="btn-eye" (click)="togglePassword()">
                            <i class="bi" 
                               [class.bi-eye-fill]="showPassword" 
                               [class.bi-eye-slash-fill]="!showPassword">
                            </i>
                        </button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirmar Senha</label>
                    <div class="password-wrapper">
                        <input 
                            [type]="showConfirmPassword ? 'text' : 'password'" 
                            name="confirmSenha" 
                            [(ngModel)]="confirmSenha" 
                            placeholder="••••••••">
                        
                        <button type="button" class="btn-eye" (click)="toggleConfirmPassword()">
                            <i class="bi" 
                               [class.bi-eye-fill]="showConfirmPassword" 
                               [class.bi-eye-slash-fill]="!showConfirmPassword">
                            </i>
                        </button>
                    </div>
                </div>

                <div *ngIf="errorMessage" style="color: #f79055; margin-bottom: 15px; font-size: 14px;">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    {{ errorMessage }}
                </div>

                <div class="actions">
                    <div class="check">
                        <input type="checkbox" id="terms">
                        <label for="terms">Li e aceito os Termos de Uso</label>
                    </div>
                </div>

                <button class="btn-login" (click)="doRegister()">Cadastrar</button>
            </form>

            <p class="footer-text">
                Já tem uma conta? <a href="javascript:void(0)" (click)="goToLogin()">Faça Login</a>
            </p>
        </div>
    </div>

    <div class="visual-side">
        <div class="grid-container">
            <div class="grid-item" *ngFor="let cell of gridCells">
                <div class="image-wrapper" [class.visible]="cell.active">
                    <img [src]="cell.image" alt="poster">
                </div>
            </div>
        </div>
        <div class="overlay-gradient"></div>
    </div>

</div>
